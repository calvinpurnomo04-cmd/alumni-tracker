<!DOCTYPE html>
<html>
<head>
<title>Dashboard Alumni</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Sistem Pelacakan Alumni</h1>

<button onclick="logout()" class="logout">Logout</button>

<div class="container">

<h2>Import / Export</h2>

<input type="file" id="fileInput">
<button onclick="importCSV()">Import CSV</button>
<button onclick="exportCSV()">Export CSV</button>

<h2>Statistik</h2>
<p>Total Alumni: <span id="total">0</span></p>
<p>Sudah Bekerja: <span id="kerja">0</span></p>

<h2>Input Data Alumni</h2>

<input id="nama" placeholder="Nama">
<input id="email" placeholder="Email">
<input id="hp" placeholder="No HP">
<input id="pekerjaan" placeholder="Tempat Kerja">
<input id="posisi" placeholder="Posisi">
<input id="status" placeholder="PNS / Swasta / Wirausaha">

<input id="linkedin" placeholder="LinkedIn">
<input id="ig" placeholder="Instagram">
<input id="fb" placeholder="Facebook">
<input id="tiktok" placeholder="TikTok">

<button onclick="tambahData()">Simpan</button>

<h2>Data Alumni</h2>

<table id="tabel">
<thead>
<tr>
<th>Nama</th>
<th>Email</th>
<th>HP</th>
<th>Pekerjaan</th>
<th>Posisi</th>
<th>Status</th>
<th>Sosial Media</th>
<th>Aksi</th>
</tr>
</thead>
<tbody></tbody>
</table>

</div>

<script src="script.js"></script>

</body>
</html>
